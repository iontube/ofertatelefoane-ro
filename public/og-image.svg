<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101828"/>
      <stop offset="50%" style="stop-color:#15243b"/>
      <stop offset="100%" style="stop-color:#101828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5ba3e6"/>
      <stop offset="100%" style="stop-color:#8b9cf7"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055b8"/>
      <stop offset="100%" style="stop-color:#004494"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e25822"/>
      <stop offset="100%" style="stop-color:#c44a1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,85,184,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:rgba(139,156,247,0.1)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="420"/>
    <line x1="800" y1="0" x2="1200" y2="210"/>
    <line x1="0" y1="210" x2="1200" y2="630"/>
    <line x1="0" y1="420" x2="800" y2="630"/>
  </g>

  <!-- Logo area - white rounded container -->
  <rect x="390" y="60" width="420" height="80" rx="16" ry="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Phone icon in logo -->
  <rect x="420" y="74" width="28" height="50" rx="6" ry="6" fill="url(#iconGrad)"/>
  <rect x="424" y="82" width="20" height="30" rx="2" ry="2" fill="#fff"/>
  <circle cx="434" cy="118" r="2.2" fill="rgba(255,255,255,0.6)"/>
  <rect x="428" y="100" width="2.5" height="8" rx="0.8" fill="#0055b8" opacity="0.4"/>
  <rect x="432.5" y="96" width="2.5" height="12" rx="0.8" fill="#0055b8" opacity="0.6"/>
  <rect x="437" y="91" width="2.5" height="17" rx="0.8" fill="#0055b8" opacity="0.8"/>
  <polyline points="429,90 432,94 440,84" fill="none" stroke="#e25822" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Logo text -->
  <text x="458" y="110" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Oferta</text>
  <text x="546" y="110" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="bold" fill="url(#orangeGrad)">Telefoane</text>

  <!-- Badge -->
  <rect x="480" y="175" width="240" height="32" rx="16" ry="16" fill="rgba(0,85,184,0.15)" stroke="rgba(0,85,184,0.3)" stroke-width="1"/>
  <text x="600" y="196" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#5ba3e6" text-anchor="middle" letter-spacing="0.5">ACTUALIZAT MARTIE 2026</text>

  <!-- Main heading -->
  <text x="600" y="270" font-family="Arial,Helvetica,sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Top Telefoane 2026</text>
  <text x="600" y="335" font-family="Arial,Helvetica,sans-serif" font-size="44" font-weight="bold" fill="url(#accent)" text-anchor="middle" letter-spacing="-0.5">Comparatii si Recomandari</text>

  <!-- Subtitle -->
  <text x="600" y="385" font-family="Arial,Helvetica,sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">23 telefoane analizate · 4 categorii de buget · Recenzii detaliate</text>

  <!-- Stats boxes -->
  <g transform="translate(200, 430)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="230" height="90" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="115" y="42" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="bold" fill="url(#accent)" text-anchor="middle">23</text>
    <text x="115" y="68" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Telefoane analizate</text>

    <!-- Stat 2 -->
    <rect x="260" y="0" width="230" height="90" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="375" y="42" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="bold" fill="url(#accent)" text-anchor="middle">4</text>
    <text x="375" y="68" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Categorii de buget</text>

    <!-- Stat 3 -->
    <rect x="520" y="0" width="230" height="90" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="635" y="42" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="bold" fill="url(#accent)" text-anchor="middle">2026</text>
    <text x="635" y="68" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Actualizat</text>
  </g>

  <!-- Bottom line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#iconGrad)"/>
</svg>
